name: Bug Report
description: Report a bug in the ACP reference server
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Connect to the server with...
        2. Send message...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node.js version, OS, and any relevant details.
      placeholder: 'Node 22.x, Ubuntu 24.04'

  - type: input
    id: version
    attributes:
      label: Version
      description: '@acprotocol/server version.'
      placeholder: '0.1.0'
